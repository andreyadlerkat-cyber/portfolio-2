name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      
name: Checkout
      uses: actions/checkout@v4

      
name: Setup Pages
      uses: actions/configure-pages@v5

      
name: Detect package manager
      id: pm
      shell: bash
      run: |
        if [ -f "${{ github.workspace }}/yarn.lock" ]; then
          echo "manager=yarn" >> $GITHUB_OUTPUT
          echo "install=install --frozen-lockfile" >> $GITHUB_OUTPUT
          echo "runner=yarn" >> $GITHUB_OUTPUT
        elif [ -f "${{ github.workspace }}/package-lock.json" ]; then
          echo "manager=npm" >> $GITHUB_OUTPUT
          echo "install=ci" >> $GITHUB_OUTPUT
          echo "runner=npm" >> $GITHUB_OUTPUT
        elif [ -f "${{ github.workspace }}/package.json" ]; then
          echo "manager=npm" >> $GITHUB_OUTPUT
          echo "install=install" >> $GITHUB_OUTPUT
          echo "runner=npm" >> $GITHUB_OUTPUT
        else
          echo "Unable to determine package manager"
          exit 1
        fi

      
name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: ${{ steps.pm.outputs.manager }}

      
name: Install dependencies
      run: ${{ steps.pm.outputs.runner }} ${{ steps.pm.outputs.install }}

      
name: Build (Vite)
      run: ${{ steps.pm.outputs.runner }} run build

      
name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      
name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
